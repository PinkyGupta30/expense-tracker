<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Expense Tracker</h2>

<div class="card p-4 shadow">

<form id="expenseForm">

<div class="row g-2">

<div class="col-md-2">
<input type="number" id="amount" class="form-control" placeholder="Choose Amount" required>
</div>

<div class="col-md-4">
<input type="text" id="description" class="form-control" placeholder="Choose Description" required>
</div>

<div class="col-md-3">
<select id="category" class="form-select" required>
<option value="">Choose Category</option>
<option value="Food">Food</option>
<option value="Entertainment">Entertainment</option>
<option value="Health">Health</option>
<option value="Self Care">Self Care</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-primary w-100">Add Expense</button>
</div>

</div>

</form>

</div>

<ul id="expenseList" class="list-group mt-4"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
